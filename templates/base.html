<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VOLUNAI - Intelligent Volunteer Coordination{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar glass-panel" style="border-radius: 0; border-top: none; border-left: none; border-right: none; position: sticky; top: 0; z-index: 100;">
        <a href="{{ url_for('index') }}" class="logo" style="font-weight: 800; letter-spacing: 1px; background: linear-gradient(135deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">VOLUNAI</a>
        <div class="nav-links">
            <a href="{{ url_for('leaderboard') }}" style="color: var(--accent-secondary); font-weight: 600; margin-right: 1.5rem;">Leaderboard</a>
            {% if session.get('user_id') %}
                <a href="{{ url_for('profile') }}" style="color: var(--text-secondary); margin-right: 1.5rem; text-decoration: none; font-weight: 500;">Profile</a>
                {% if session.get('user_role') == 'organizer' %}
                    <a href="{{ url_for('organizer_dashboard') }}" style="color: var(--accent-primary); margin-right: 1rem; text-decoration: none;">Dashboard</a>
                {% else %}
                    <a href="{{ url_for('volunteer_dashboard') }}" style="color: var(--accent-primary); margin-right: 1rem; text-decoration: none;">Dashboard</a>
                {% endif %}
                <a href="{{ url_for('logout') }}" class="btn-primary" style="padding: 0.5rem 1rem;">Logout</a>
            {% else %}
                <a href="{{ url_for('index') }}#how-it-works" style="margin-right: 1.5rem; color: var(--text-secondary); text-decoration: none; font-weight: 500;">How it Works</a>
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('signup') }}" class="btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Real-time Notifications UI -->
    <div id="notification-toast" style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: none;">
        <div class="glass-panel" style="padding: 1.5rem; min-width: 300px; border-left: 5px solid var(--danger); box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.5s ease-out;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div style="flex: 1;">
                    <h3 style="margin: 0; color: var(--danger); font-size: 1.1rem;" id="toast-title">New Assignment!</h3>
                    <p style="margin: 0.5rem 0 0 0; font-size: 0.9rem; color: var(--text-secondary);" id="toast-desc"></p>
                </div>
                <button onclick="document.getElementById('notification-toast').style.display='none'" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem; line-height: 1;">&times;</button>
            </div>
            <div style="margin-top: 1rem;">
                <a href="{{ url_for('volunteer_dashboard') }}" class="btn-primary btn-hover-effect" style="padding: 0.5rem 1rem; font-size: 0.8rem; display: inline-block;">View Dashboard</a>
            </div>
        </div>
    </div>

    <!-- Notification Sound -->
    <audio id="ping-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <style>
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    </style>

    <!-- Socket.io Implementation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        
        {% if session.get('user_id') %}
        socket.on('connect', function() {
            socket.emit('join', {user_id: "{{ session.get('user_id') }}"});
        });
        {% endif %}

        socket.on('new_assignment', function(data) {
            document.getElementById('toast-title').innerText = "🚨 New Task: " + data.title;
            document.getElementById('toast-desc').innerText = "Location: " + data.location + " | Urgency: " + data.urgency + "/10";
            document.getElementById('notification-toast').style.display = 'block';
            
            // Play ping sound
            var sound = document.getElementById('ping-sound');
            sound.play().catch(function(error) {
                console.log("Audio playback prevented by browser settings.");
            });
            
            // Auto-hide after 12 seconds
            setTimeout(function() {
                document.getElementById('notification-toast').style.display = 'none';
            }, 12000);
        });
    </script>
</body>
</html>
