{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 4rem auto; padding: 2.5rem;">
    <h2 style="text-align: center; margin-top: 0; margin-bottom: 0.5rem;">Reset Password</h2>
    <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem;">Enter your email to receive a secure reset link.</p>
    
    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Email Address</label>
            <input type="email" name="email" required style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box;">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem; background: var(--accent-secondary);">Send Reset Link</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('login') }}" style="color: var(--text-secondary);">Back to Login</a>
    </p>
</div>
{% endblock %}
